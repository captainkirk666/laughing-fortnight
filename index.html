<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== GLOBAL ===== */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: #e2e8f0;
}

/* ===== CONTAINER ===== */
.page {
  max-width: 1200px;
  margin: 0 auto;
}

/* ===== HEADER ===== */
header {
  background: #020617;
  padding: 10px 16px;
  font-size: 18px;
  margin-bottom: 10px;
}

/* ===== TABLE ===== */
.container {
  padding: 10px;
}

table {
  border-collapse: collapse;
  width: 100%;
  background: #020617;
  font-size: 13px;
}

th, td {
  padding: 5px 7px;
  border: 1px solid rgba(30, 41, 59, 0.5);
}

th {
  position: sticky;
  top: 0;
  background: #020617;
  cursor: pointer;
}

td:not(:first-child) {
  text-align: right;
}

tr:hover {
  background: #1e293b;
}

.positive { color: #22c55e; }
.negative { color: #ef4444; }

/* ===== CHARTS ===== */
.charts {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  padding: 10px;
}

.chart-box {
  background: #020617;
  border: 1px solid #1e293b;
  padding: 10px;
  height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chart-box canvas {
  width: 100% !important;
  height: auto !important;
}

/* ===== FOOTER ===== */
.footer {
  margin: 10px auto;
  background: #020617;
  padding: 10px 16px;
  border-top: 1px solid #1e293b;
  display: flex;
  justify-content: space-between;
}

/* ===== MOBILE ===== */
@media (max-width: 900px) {
  .charts {
    grid-template-columns: 1fr;
  }
}
</style>

</head>

<body>

<div class="page">

<header>📈 $100,000 March 2026</header>

<div class="container">
  <table id="stocks">
    <thead><tr id="headers"></tr></thead>
    <tbody></tbody>
  </table>
</div>

<div class="charts">
  <div class="chart-box"><canvas id="changeChart"></canvas></div>
  <div class="chart-box"><canvas id="holdingChart"></canvas></div>
  <div class="chart-box"><canvas id="pieChart"></canvas></div>
</div>

<div class="footer">
  <div>Total Portfolio Value:</div>
  <div id="totalValue">$0</div>
</div>

</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbwEO4t-V8lIIUh37i-0pQ3UOJWkFGapd3lHQ-mJoBccOY6i4dlTTnYi3nVjTxlf-pTqTA/exec";

let changeChart, holdingChart, pieChart;

function buildCharts(data) {
  const labels = data.map(r => r["Ticker"]);
  const change = data.map(r => parseFloat(r["Change %"]) || 0);
  const totals = data.map(r => parseFloat(r["TOTAL $"]) || 0);

  const sum = totals.reduce((a,b)=>a+b,0);
  const perc = totals.map(v => (v/sum*100));

  [changeChart, holdingChart, pieChart].forEach(c => c && c.destroy());

  // Change chart
  changeChart = new Chart(changeChartEl, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data: change,
        backgroundColor: change.map(v => v >= 0 ? "#22c55e" : "#ef4444")
      }]
    },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display:false } }
    }
  });

  // Holdings chart
  holdingChart = new Chart(holdingChartEl, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data: totals,
        backgroundColor: "#3b82f6"
      }]
    },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display:false } }
    }
  });

  // Donut chart
  pieChart = new Chart(pieChartEl, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data: perc,
        backgroundColor: [
          "#3b82f6","#ef4444","#f59e0b","#10b981",
          "#8b5cf6","#14b8a6","#eab308","#f97316",
          "#a3a3a3","#ec4899"
        ]
      }]
    },
    options: {
      maintainAspectRatio: true,
      aspectRatio: 1,
      cutout: "65%",
      plugins: {
        legend: {
          position: "bottom",
          labels: { color:"#e2e8f0", font:{size:10} }
        }
      }
    }
  });
}

const changeChartEl = document.getElementById("changeChart");
const holdingChartEl = document.getElementById("holdingChart");
const pieChartEl = document.getElementById("pieChart");

function handleData(data) {
  const headersRow = document.getElementById("headers");
  const tbody = document.querySelector("#stocks tbody");
  const totalDisplay = document.getElementById("totalValue");

  headersRow.innerHTML = "";
  tbody.innerHTML = "";

  Object.keys(data[0]).forEach(key => {
    const th = document.createElement("th");
    th.textContent = key;
    headersRow.appendChild(th);
  });

  let total = 0;

  data.forEach(row=>{
    const tr=document.createElement("tr");

    Object.entries(row).forEach(([k,v])=>{
      const td=document.createElement("td");
      td.textContent=v;

      if(k.toLowerCase().includes("change")){
        const num=parseFloat(v);
        if(!isNaN(num)) td.classList.add(num>=0?"positive":"negative");
      }

      if(k.toLowerCase().includes("total")){
        const num=parseFloat(v);
        if(!isNaN(num)) total+=num;
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  totalDisplay.textContent="$"+total.toLocaleString();

  buildCharts(data);
}

function loadData(){
  const s=document.createElement("script");
  s.src=sheetURL+"?callback=handleData";
  document.body.appendChild(s);
}

loadData();
setInterval(loadData,10000);
</script>

</body>
</html>
