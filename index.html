<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTjEdatFjbF1-4mk9S_bvWXitZaX7hJ5TS38bmPPj6x5z5rcNiVBkJjotWEk8JvpPPFFj08h5SwRkG4/pub?gid=1328614085&single=true&output=csv";

// Fetch + parse CSV
async function getData() {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    return text.trim().split("\n").map(r => r.split(","));
}

// Build table
function renderTable(rows) {
    const headers = rows[0];
    const data = rows.slice(1);

    const thead = document.getElementById("table-head");
    const tbody = document.getElementById("table-body");

    // Header row
    thead.innerHTML = `
        <tr>
            ${headers.map(h => `<th class="px-4 py-2 border">${h}</th>`).join("")}
        </tr>
    `;

    // Body rows
    tbody.innerHTML = data.map(row => `
        <tr class="hover:bg-slate-50">
            ${row.map(cell => `<td class="px-4 py-2 border">${cell}</td>`).join("")}
        </tr>
    `).join("");
}

// Optional: still build chart from first 2 columns
function renderChart(rows) {
    const labels = rows.slice(1).map(r => r[0]);
    const values = rows.slice(1).map(r => Number(r[1]));

    const ctx = document.getElementById("mainChart");

    new Chart(ctx, {
        type: "line",
        data: {
            labels,
            datasets: [{
                data: values,
                borderColor: "#4f46e5",
                backgroundColor: "rgba(79,70,229,0.1)",
                fill: true
            }]
        }
    });
}

// Init
document.addEventListener("DOMContentLoaded", async () => {
    const rows = await getData();

    renderTable(rows);
    renderChart(rows);
});
</script>
