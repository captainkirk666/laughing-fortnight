<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock Dashboard</title>

<!-- Link your CSS -->
<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="page">

<header>
  📈 $100,000 March 2026
</header>

<div class="container">
  <table id="stocks">
    <thead>
      <tr id="headers"></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- ✅ Charts (fixed layout) -->
<div class="charts">
  <div class="chart-box">
    <canvas id="changeChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="holdingChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="pieChart"></canvas>
  </div>
</div>

<div class="footer">
  <div>Total Portfolio Value:</div>
  <div id="totalValue">$0</div>
</div>

</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbwEO4t-V8lIIUh37i-0pQ3UOJWkFGapd3lHQ-mJoBccOY6i4dlTTnYi3nVjTxlf-pTqTA/exec";

let changeChart, holdingChart, pieChart;

function buildCharts(data) {
  const labels = data.map(r => r["Ticker"]);
  const change = data.map(r => parseFloat(r["Change %"]) || 0);
  const totals = data.map(r => parseFloat(r["TOTAL $"]) || 0);

  const sum = totals.reduce((a,b)=>a+b,0);
  const perc = totals.map(v => (v/sum*100));

  // Destroy old charts
  [changeChart, holdingChart, pieChart].forEach(c => c && c.destroy());

  // 📊 Daily % Change
  changeChart = new Chart(document.getElementById("changeChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data: change
      }]
    },
    options: {
      plugins: { legend: { display: false } }
    }
  });

  // 📊 Holdings $
  holdingChart = new Chart(document.getElementById("holdingChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data: totals
      }]
    },
    options: {
      plugins: { legend: { display: false } }
    }
  });

  // 🍩 Holdings %
  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data: perc
      }]
    }
  });
}

function handleData(data) {
  const headersRow = document.getElementById("headers");
  const tbody = document.querySelector("#stocks tbody");
  const totalDisplay = document.getElementById("totalValue");

  headersRow.innerHTML = "";
  tbody.innerHTML = "";

  if (!data || data.length === 0) return;

  // Headers + sorting
  Object.keys(data[0]).forEach((key, colIndex) => {
    const th = document.createElement("th");
    th.textContent = key;

    th.addEventListener("click", () => {
      const rows = Array.from(tbody.querySelectorAll("tr"));

      const sorted = rows.sort((a, b) => {
        let A = a.children[colIndex].textContent.replace(/[$,]/g, "");
        let B = b.children[colIndex].textContent.replace(/[$,]/g, "");

        return (parseFloat(B) || 0) - (parseFloat(A) || 0);
      });

      tbody.innerHTML = "";
      sorted.forEach(tr => tbody.appendChild(tr));
    });

    headersRow.appendChild(th);
  });

  let total = 0;

  // Build rows
  data.forEach(row => {
    const tr = document.createElement("tr");

    Object.entries(row).forEach(([key, value]) => {
      const td = document.createElement("td");

      // Format currency
      if (key.toLowerCase().includes("price") || key.toLowerCase().includes("total")) {
        const num = parseFloat(value);
        td.textContent = !isNaN(num) ? "$" + num.toLocaleString() : value;
      } else {
        td.textContent = value;
      }

      // Colour change
      if (key.toLowerCase().includes("change")) {
        const num = parseFloat(value);
        if (!isNaN(num)) {
          td.classList.add(num >= 0 ? "positive" : "negative");
        }
      }

      // Total calculation
      if (key.toLowerCase().includes("total")) {
        const num = parseFloat(value);
        if (!isNaN(num)) total += num;
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  totalDisplay.textContent = "$" + total.toLocaleString();

  // Build charts
  buildCharts(data);
}

// JSONP loader
function loadData() {
  const script = document.createElement("script");
  script.src = sheetURL + "?callback=handleData";
  document.body.appendChild(script);
}

loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
