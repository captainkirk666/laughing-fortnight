<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock Dashboard</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@400;500&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css?v=5">

<!-- CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="page">

<header>📈 $100,000 March 2026</header>

<div class="container">
  <table id="stocks">
    <thead><tr id="headers"></tr></thead>
    <tbody></tbody>
  </table>
</div>

<div class="total-bar">
  <div class="total-label">Total Portfolio Value</div>
  <div id="totalValue">$0</div>
</div>

<div class="charts">
  <div class="chart-box"><canvas id="changeChart"></canvas></div>
  <div class="chart-box"><canvas id="holdingChart"></canvas></div>
  <div class="chart-box"><canvas id="pieChart"></canvas></div>
</div>

</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbwEO4t-V8lIIUh37i-0pQ3UOJWkFGapd3lHQ-mJoBccOY6i4dlTTnYi3nVjTxlf-pTqTA/exec";

let changeChart, holdingChart, pieChart;

const centerTextPlugin = {
  id: 'centerText',
  beforeDraw(chart) {
    const { width, height, ctx } = chart;
    const total = chart.config.data.datasets[0].data.reduce((a,b)=>a+b,0);

    ctx.save();
    ctx.font = "bold 16px Inter";
    ctx.fillStyle = "#e2e8f0";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("$" + total.toLocaleString(), width/2, height/2);
  }
};

function buildCharts(data) {
  const labels = data.map(r => r["Ticker"]);
  const change = data.map(r => parseFloat(r["Change %"]) || 0);
  const totals = data.map(r => parseFloat(r["TOTAL $"]) || 0);

  [changeChart, holdingChart, pieChart].forEach(c => c && c.destroy());

  changeChart = new Chart(changeChartEl, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Change %",
        data: change,
        backgroundColor: change.map(v => v >= 0 ? "#22c55e" : "#ef4444")
      }]
    },
    options: { maintainAspectRatio:false }
  });

  holdingChart = new Chart(holdingChartEl, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Holdings $",
        data: totals,
        backgroundColor: "#3b82f6"
      }]
    },
    options: { maintainAspectRatio:false }
  });

  pieChart = new Chart(pieChartEl, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data: totals,
        backgroundColor: [
          "#3b82f6","#ef4444","#f59e0b","#10b981",
          "#8b5cf6","#14b8a6","#eab308","#f97316",
          "#a3a3a3","#ec4899"
        ]
      }]
    },
    options: {
      maintainAspectRatio:false,
      cutout:"70%",
      plugins:{
        legend:{
          position:"bottom",
          labels:{ color:"#e2e8f0", font:{size:11, family:"Roboto"} }
        }
      }
    },
    plugins:[centerTextPlugin]
  });
}

const changeChartEl = document.getElementById("changeChart");
const holdingChartEl = document.getElementById("holdingChart");
const pieChartEl = document.getElementById("pieChart");

function handleData(data) {
  const headersRow = document.getElementById("headers");
  const tbody = document.querySelector("#stocks tbody");
  const totalDisplay = document.getElementById("totalValue");

  headersRow.innerHTML = "";
  tbody.innerHTML = "";

  Object.keys(data[0]).forEach(key=>{
    const th=document.createElement("th");
    th.textContent=key;
    headersRow.appendChild(th);
  });

  let total=0;

  data.forEach(row=>{
    const tr=document.createElement("tr");

    Object.entries(row).forEach(([k,v])=>{
      const td=document.createElement("td");
      const num=parseFloat(v);

      if(k.toLowerCase().includes("price") || k.toLowerCase().includes("total")){
        td.textContent=!isNaN(num) ? "$" + num.toFixed(2) : v;
      } else {
        td.textContent=v;
      }

      if(k.toLowerCase().includes("change")){
        if(!isNaN(num)) td.classList.add(num>=0?"positive":"negative");
      }

      if(k.toLowerCase().includes("total") && !isNaN(num)) total+=num;

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  totalDisplay.textContent="$"+total.toLocaleString();
  buildCharts(data);
}

function loadData(){
  const s=document.createElement("script");
  s.src=sheetURL+"?callback=handleData";
  document.body.appendChild(s);
}

loadData();
setInterval(loadData,10000);
</script>

</body>
</html>
