<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Stock Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      background: #020617;
      padding: 15px 20px;
      font-size: 20px;
      border-bottom: 1px solid #1e293b;
    }

    .container {
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: #020617;
    }

    th, td {
      padding: 10px;
      border: 1px solid #1e293b;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #020617;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    tr:nth-child(even) {
      background: #020617;
    }

    tr:hover {
      background: #1e293b;
    }

    .positive {
      color: #22c55e;
      font-weight: bold;
    }

    .negative {
      color: #ef4444;
      font-weight: bold;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #020617;
      border-top: 1px solid #1e293b;
      padding: 15px 20px;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>

<body>

<header>
  📈 Live Stock Dashboard
</header>

<div class="container">
  <table id="stocks">
    <thead>
      <tr id="headers"></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="footer">
  <div>Total Portfolio Value:</div>
  <div id="totalValue">$0</div>
</div>

<script>
const sheetURL = "https://script.googleusercontent.com/macros/s/AKfycbwdOgb4GvdEF7c-VB4s5mdgJpETUWGOZHAT1qjBbJlzgcs-YZExdvV0_5k3TWVMjVlKgQ/exec";

async function loadData() {
  try {
    const res = await fetch(sheetURL);
    const data = await res.json();

    const headersRow = document.getElementById("headers");
    const tbody = document.querySelector("#stocks tbody");
    const totalDisplay = document.getElementById("totalValue");

    headersRow.innerHTML = "";
    tbody.innerHTML = "";

    if (!data || data.length === 0) return;

    // Headers
    Object.keys(data[0]).forEach(key => {
      const th = document.createElement("th");
      th.textContent = key;
      headersRow.appendChild(th);
    });

    let total = 0;

    // Rows
    data.forEach(row => {
      const tr = document.createElement("tr");

      Object.entries(row).forEach(([key, value]) => {
        const td = document.createElement("td");
        td.textContent = value;

        // Color gains/losses
        if (key.toLowerCase().includes("change")) {
          const num = parseFloat(value);
          if (!isNaN(num)) {
            td.classList.add(num >= 0 ? "positive" : "negative");
          }
        }

        // Calculate total
        if (key.toLowerCase().includes("total")) {
          const num = parseFloat(value);
          if (!isNaN(num)) total += num;
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    totalDisplay.textContent = "$" + total.toLocaleString();

  } catch (err) {
    console.error("ERROR:", err);
  }
}

// Load + auto refresh
loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
