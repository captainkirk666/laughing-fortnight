<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=16">
</head>

<body>

<div class="page">

<h2>DASHBOARD</h2>

<div class="homepage">
  <div class="homepage-grid">

<!-- ETF CARD (working example) -->
<div class="homepage-card">

  <div class="homepage-header">
    <h3>ETF</h3>
    <p class="homepage-meta">Starting capital: $100,000 - May 2026</p>
  </div>

  <div class="homepage-body">
    <div class="homepage-value" id="etf-total">$--</div>

    <div class="card-performance">
      <span class="daily"></span>
      <span class="portfolio"></span>
    </div>
  </div>

  <div class="homepage-chart">
    <canvas id="etf-mini"></canvas>
  </div>

</div>

  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbyP6ar_G67uTxgMwmhMlxSFZ3LFAtyPf7wiuLfUo_jxRpaQnYNhbkhws8aY_0AFe22yEg/exec";

const liveTotals = {};

/* ===== LOAD ===== */
function loadSheet(sheet, callback) {
  const s = document.createElement("script");
  s.src = `${BASE_URL}?sheet=${encodeURIComponent(sheet)}&callback=${callback}`;
  document.head.appendChild(s);
}

/* ===== PERFORMANCE ===== */
function calculatePerformance(totals, live) {
  if (!totals.length || !live) return null;

  const portfolio = ((live - 100000) / 100000) * 100;

  let daily = 0;
  if (totals.length > 1) {
    const prev = totals[totals.length - 2];
    daily = ((live - prev) / prev) * 100;
  }

  return { daily, portfolio };
}

function formatPercent(v) {
  return (v >= 0 ? "+" : "") + v.toFixed(2) + "%";
}

function applyPerformance(card, daily, portfolio) {
  if (!card) return;

  const d = card.querySelector(".daily");
  const p = card.querySelector(".portfolio");

  if (!d || !p) return;

  d.textContent = "Daily " + formatPercent(daily);
  p.textContent = "Portfolio " + formatPercent(portfolio);

  d.className = "daily " + (daily >= 0 ? "positive" : "negative");
  p.className = "portfolio " + (portfolio >= 0 ? "positive" : "negative");
}

/* ===== TOTAL ===== */
function renderTotal(data, prefix) {
  const total = data.reduce((sum, r) => {
    const val = parseFloat(String(r["TOTAL $"] || "").replace(/[$,]/g, ""));
    return sum + (isNaN(val) ? 0 : val);
  }, 0);

  liveTotals[prefix] = total;

  const el = document.getElementById(`${prefix}-total`);
  if (!el) return;

  el.textContent = "$" + total.toLocaleString(undefined, { minimumFractionDigits: 2 });
}

/* ===== CARD ===== */
function renderCard(data, column, prefix) {

  const totals = data
    .map(r => parseFloat(r[column]))
    .filter(v => !isNaN(v) && v > 0);

  if (!totals.length) return;

  const live = liveTotals[prefix];
  if (!live) {
    setTimeout(() => renderCard(data, column, prefix), 100);
    return;
  }

  const perf = calculatePerformance(totals, live);
  if (!perf) return;

  const totalEl = document.getElementById(`${prefix}-total`);
  if (!totalEl) return;

  const card = totalEl.closest(".homepage-card");
  if (!card) return;

  applyPerformance(card, perf.daily, perf.portfolio);

  new Chart(document.getElementById(`${prefix}-mini`), {
    type: "line",
    data: {
      labels: totals.map((_, i) => i),
      datasets: [{
        data: totals,
        borderColor: "#60a5fa",
        borderWidth: 3,
        tension: 0.4,
        pointRadius: 0,
        fill: true
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: { x: { display: false }, y: { display: false } }
    }
  });
}

/* ===== CALLBACKS ===== */
function handleETF(data) { renderTotal(data, "etf"); }
function handleETFHistory(data) { renderCard(data, "Total", "etf"); }

/* ===== RUN ===== */
document.addEventListener("DOMContentLoaded", () => {
  loadSheet("ETF May 1", "handleETF");
  loadSheet("ETF May 1 History", "handleETFHistory");
});
</script>

</body>
</html>
