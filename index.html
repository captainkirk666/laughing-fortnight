<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbyP6ar_G67uTxgMwmhMlxSFZ3LFAtyPf7wiuLfUo_jxRpaQnYNhbkhws8aY_0AFe22yEg/exec";

/* ===== GLOBAL STORE ===== */
const liveTotals = {};

/* ===== CHART GLOW ===== */
const glowPlugin = {
  id: "glow",
  beforeDatasetDraw(chart) {
    const { ctx } = chart;
    ctx.save();
    ctx.shadowColor = "rgba(96,165,250,0.6)";
    ctx.shadowBlur = 12;
  },
  afterDatasetDraw(chart) {
    chart.ctx.restore();
  }
};

/* ===== LOAD SHEET ===== */
function loadSheet(sheetName, callback) {
  const s = document.createElement("script");
  s.src = `${BASE_URL}?sheet=${encodeURIComponent(sheetName)}&callback=${callback}`;
  document.body.appendChild(s);
}

/* ===== PERFORMANCE LOGIC ===== */
function calculatePerformance(totals, live) {
  if (!totals || totals.length === 0 || !live) return null;

  const first = totals[0];

  const portfolio = ((live - 100000) / 100000) * 100;

  let daily = 0;
  if (totals.length > 1) {
    const prev = totals[totals.length - 2];
    if (prev > 0) {
      daily = ((live - prev) / prev) * 100;
    }
  }

  return { daily, portfolio };
}

function formatPercent(val) {
  return (val >= 0 ? "+" : "") + val.toFixed(2) + "%";
}

function applyPerformanceToCard(card, daily, portfolio) {
  if (!card) return;

  const dailyEl = card.querySelector(".daily");
  const portfolioEl = card.querySelector(".portfolio");

  if (!dailyEl || !portfolioEl) return;

  dailyEl.textContent = "Daily " + formatPercent(daily);
  portfolioEl.textContent = "Portfolio " + formatPercent(portfolio);

  dailyEl.classList.remove("positive", "negative");
  portfolioEl.classList.remove("positive", "negative");

  dailyEl.classList.add(daily >= 0 ? "positive" : "negative");
  portfolioEl.classList.add(portfolio >= 0 ? "positive" : "negative");
}

/* ===== RENDER TOTAL ===== */
function renderTotal(data, prefix) {
  const total = data.reduce((sum, r) => {
    const val = parseFloat(
      String(r["TOTAL $"] || "").replace(/[$,]/g, "")
    );
    return sum + (isNaN(val) ? 0 : val);
  }, 0);

  liveTotals[prefix] = total;

  document.getElementById(`${prefix}-total`).textContent =
    "$" + total.toLocaleString(undefined, { minimumFractionDigits: 2 });
}

/* ===== RENDER CARD ===== */
function renderCard(data, column, prefix) {

  const totals = data
    .map(r => parseFloat(r[column]))
    .filter(v => !isNaN(v) && v > 0);

  if (totals.length === 0) return;

  const live = liveTotals[prefix];

  if (!live) {
    setTimeout(() => renderCard(data, column, prefix), 100);
    return;
  }

  // apply performance
  const perf = calculatePerformance(totals, live);
  if (!perf) return;

  const card = document
    .getElementById(`${prefix}-total`)
    .closest(".homepage-card");

  applyPerformanceToCard(card, perf.daily, perf.portfolio);

  // chart
  new Chart(document.getElementById(`${prefix}-mini`), {
    type: "line",
    data: {
      labels: totals.map((_, i) => i),
      datasets: [{
        data: totals,
        borderColor: "#60a5fa",
        borderWidth: 3,
        tension: 0.4,
        pointRadius: 0,
        fill: "origin",
        borderJoinStyle: "round",
        borderCapStyle: "round",
        backgroundColor: (ctx) => {
          const chart = ctx.chart;
          const { ctx: canvas, chartArea } = chart;
          if (!chartArea) return "rgba(59,130,246,0.1)";

          const gradient = canvas.createLinearGradient(
            0, chartArea.top,
            0, chartArea.bottom
          );

          gradient.addColorStop(0, "rgba(59,130,246,0.18)");
          gradient.addColorStop(0.6, "rgba(59,130,246,0.06)");
          gradient.addColorStop(1, "rgba(59,130,246,0.01)");

          return gradient;
        }
      }]
    },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { x: { display: false }, y: { display: false } }
    },
    plugins: [glowPlugin]
  });
}

/* ===== CALLBACKS ===== */
function handleDarvas(data) { renderTotal(data, "darvas"); }
function handleInTrend(data) { renderTotal(data, "intrend"); }
function handleBreakout(data) { renderTotal(data, "breakout"); }
function handleETF(data) { renderTotal(data, "etf"); }

function handleDarvasHistory(data) { renderCard(data, "Total", "darvas"); }
function handleInTrendHistory(data) { renderCard(data, "Total", "intrend"); }
function handleBreakoutHistory(data) { renderCard(data, "Total", "breakout"); }
function handleETFHistory(data) { renderCard(data, "Total", "etf"); }

/* ===== RUN ===== */
loadSheet("Darvas Oct 25", "handleDarvas");
loadSheet("InTrend May 1", "handleInTrend");
loadSheet("Breakout May 26", "handleBreakout");
loadSheet("ETF May 1", "handleETF");

loadSheet("Darvas Oct 25 History", "handleDarvasHistory");
loadSheet("InTrend May 1 History", "handleInTrendHistory");
loadSheet("Breakout May 26 History", "handleBreakoutHistory");
loadSheet("ETF May 1 History", "handleETFHistory");
</script>
