<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.charts {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  padding: 10px;
}

.chart-box {
  background: #020617;
  border: 1px solid #1e293b;
  padding: 10px;
  height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chart-box canvas {
  width: 100% !important;
  height: 100% !important;
}

/* Fix donut sizing */
#pieChart {
  max-height: 240px;
}
</style>

</head>

<body>

<div class="page">

<header>📈 $100,000 March 2026</header>

<div class="container">
  <table id="stocks">
    <thead><tr id="headers"></tr></thead>
    <tbody></tbody>
  </table>
</div>

<div class="charts">

  <div class="chart-box">
    <canvas id="changeChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="holdingChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="pieChart"></canvas>
  </div>

</div>

<div class="footer">
  <div>Total Portfolio Value:</div>
  <div id="totalValue">$0</div>
</div>

</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbwEO4t-V8lIIUh37i-0pQ3UOJWkFGapd3lHQ-mJoBccOY6i4dlTTnYi3nVjTxlf-pTqTA/exec";

let changeChart, holdingChart, pieChart;

function buildCharts(data) {
  const labels = data.map(r => r["Ticker"]);
  const change = data.map(r => parseFloat(r["Change %"]) || 0);
  const totals = data.map(r => parseFloat(r["TOTAL $"]) || 0);

  const sum = totals.reduce((a,b)=>a+b,0);
  const perc = totals.map(v => (v/sum*100));

  [changeChart, holdingChart, pieChart].forEach(c => c && c.destroy());

  // 📊 Change Chart
  changeChart = new Chart(document.getElementById("changeChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data: change,
        backgroundColor: change.map(v => v >= 0 ? "#22c55e" : "#ef4444"),
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display:false } },
      scales: {
        x: { ticks:{color:"#94a3b8"}, grid:{display:false}},
        y: { ticks:{color:"#94a3b8"}, grid:{color:"#1e293b"}}
      }
    }
  });

  // 📊 Holdings Chart
  holdingChart = new Chart(document.getElementById("holdingChart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data: totals,
        backgroundColor: "#3b82f6",
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display:false } },
      scales: {
        x: { ticks:{color:"#94a3b8"}, grid:{display:false}},
        y: { ticks:{color:"#94a3b8"}, grid:{color:"#1e293b"}}
      }
    }
  });

  // 🍩 Donut Chart (FIXED + COMPACT LEGEND)
  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "doughnut",
    data: {
      labels,
      datasets: [{
        data: perc,
        backgroundColor: [
          "#3b82f6","#ef4444","#f59e0b","#10b981",
          "#8b5cf6","#14b8a6","#eab308","#f97316",
          "#a3a3a3","#ec4899"
        ],
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: "65%",
      layout: { padding: 10 },
      plugins: {
        legend: {
          position: "bottom",
          labels: {
            color: "#e2e8f0",
            boxWidth: 10,
            padding: 10,
            font: { size: 10 }
          }
        }
      }
    }
  });
}

function handleData(data) {
  const headersRow = document.getElementById("headers");
  const tbody = document.querySelector("#stocks tbody");
  const totalDisplay = document.getElementById("totalValue");

  headersRow.innerHTML = "";
  tbody.innerHTML = "";

  if (!data.length) return;

  Object.keys(data[0]).forEach((key, colIndex) => {
    const th = document.createElement("th");
    th.textContent = key;

    th.onclick = () => {
      const rows = [...tbody.rows];
      rows.sort((a,b)=>{
        let A = a.cells[colIndex].textContent.replace(/[$,]/g,"");
        let B = b.cells[colIndex].textContent.replace(/[$,]/g,"");
        return (parseFloat(B)||0)-(parseFloat(A)||0);
      });
      tbody.innerHTML="";
      rows.forEach(r=>tbody.appendChild(r));
    };

    headersRow.appendChild(th);
  });

  let total = 0;

  data.forEach(row=>{
    const tr = document.createElement("tr");

    Object.entries(row).forEach(([k,v])=>{
      const td=document.createElement("td");

      if(k.toLowerCase().includes("price")||k.toLowerCase().includes("total")){
        let num=parseFloat(v);
        td.textContent=!isNaN(num)?"$"+num.toLocaleString():v;
      } else td.textContent=v;

      if(k.toLowerCase().includes("change")){
        let num=parseFloat(v);
        if(!isNaN(num)) td.classList.add(num>=0?"positive":"negative");
      }

      if(k.toLowerCase().includes("total")){
        let num=parseFloat(v);
        if(!isNaN(num)) total+=num;
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  totalDisplay.textContent="$"+total.toLocaleString();

  buildCharts(data);
}

function loadData(){
  const s=document.createElement("script");
  s.src=sheetURL+"?callback=handleData";
  document.body.appendChild(s);
}

loadData();
setInterval(loadData,10000);
</script>

</body>
</html>
